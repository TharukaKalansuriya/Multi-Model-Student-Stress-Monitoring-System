name: student_stress_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Audio recording
  flutter_sound_lite: ^8.5.0

  # Utilities
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  http: ^1.2.2
  shared_preferences: ^2.2.2

  # State Management
  provider: ^6.0.0

  # Firebase
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.1.0

  # Notifications
  flutter_local_notifications: ^17.1.2

  workmanager: ^0.5.2
  app_usage: ^3.0.0
  call_log: ^4.0.0
  sensors_plus: ^4.0.2

dependency_overrides: {}

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/labels.txt
    - assets/yamnet.tflite
    - assets/models/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 24
